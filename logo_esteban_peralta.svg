<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Monogram badge -->
  <rect x="0" y="10" width="80" height="80" rx="14" fill="#0f172a"/>
  <rect x="5" y="15" width="70" height="70" rx="10" fill="none" stroke="url(#accentGrad)" stroke-width="1.5"/>

  <!-- E -->
  <text x="12" y="72" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="52" font-weight="800" fill="#38bdf8" letter-spacing="-2">E</text>

  <!-- P -->
  <text x="41" y="72" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="52" font-weight="800" fill="white" letter-spacing="-2">P</text>

  <!-- Accent dot -->
  <circle cx="76" cy="20" r="5" fill="#38bdf8"/>

  <!-- Name: ESTEBAN -->
  <text x="96" y="48" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="700" fill="#0f172a" letter-spacing="1">ESTEBAN</text>

  <!-- Name: PERALTA -->
  <text x="96" y="74" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="300" fill="#38bdf8" letter-spacing="3.5">PERALTA</text>

  <!-- Thin underline accent -->
  <line x1="96" y1="80" x2="310" y2="80" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
